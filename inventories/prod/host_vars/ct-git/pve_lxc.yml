# General
pve_lxc_vmid: 101003

# Network
pve_lxc_interfaces:
  # TODO Remove IPv4 support by implementing NAT64
  net0: name=eth0,bridge=public,firewall=1,hwaddr=BC:24:11:4B:D2:05,ip=dhcp,ip6=auto
  # TODO Remove IPv4 support by implementing NAT64
  net1: name=eth1,bridge=data,firewall=1,hwaddr=BC:24:11:B7:CA:AA,ip=dhcp,ip6=auto

# Firewall
pve_lxc_firewall_rules:
  - pos: 0
    enable: true
    type: in
    action: ACCEPT
    proto: icmp
    log: nolog
    comment: icmp (ipv4)
  - pos: 1
    enable: true
    type: in
    action: ACCEPT
    proto: ipv6-icmp
    log: nolog
    comment: icmp (ipv6)
  - pos: 2
    enable: true
    type: in
    action: ACCEPT
    proto: tcp
    dport: 22
    log: nolog
    comment: ssh
  - pos: 3
    enable: true
    type: in
    action: ACCEPT
    proto: tcp
    dport: 80
    log: nolog
    comment: http
  - pos: 4
    enable: true
    type: in
    action: ACCEPT
    proto: tcp
    dport: 443
    log: nolog
    comment: https
