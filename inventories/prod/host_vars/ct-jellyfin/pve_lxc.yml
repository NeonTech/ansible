# General
pve_lxc_vmid: 102000

# Storage
pve_lxc_storage: "{{ pve_storage_local }}"
pve_lxc_storage_fs: "{{ pve_storage_local_fs }}"

# Disks
pve_lxc_disk_volume_size: 512 # GiB

# CPU
pve_lxc_cpu_cores: 8

# Memory
pve_lxc_memory: 16384 # MB

# Network
pve_lxc_interfaces:
  # TODO Remove IPv4 support by implementing NAT64
  net0: name=eth0,bridge=public,firewall=1,hwaddr=BC:24:11:B7:DE:EB,ip=dhcp,ip6=auto

# Firewall
pve_lxc_firewall_rules:
  - pos: 0
    enable: true
    type: in
    action: ACCEPT
    proto: icmp
    log: nolog
    comment: icmp (ipv4)
  - pos: 1
    enable: true
    type: in
    action: ACCEPT
    proto: ipv6-icmp
    log: nolog
    comment: icmp (ipv6)
  - pos: 2
    enable: true
    type: in
    action: ACCEPT
    proto: tcp
    dport: 22
    log: nolog
    comment: ssh
  - pos: 3
    enable: true
    type: in
    action: ACCEPT
    proto: tcp
    dport: 80
    log: nolog
    comment: http
  - pos: 4
    enable: true
    type: in
    action: ACCEPT
    proto: tcp
    dport: 443
    log: nolog
    comment: https
