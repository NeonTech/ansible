- name: Install required packages
  ansible.builtin.apt:
    update_cache: true
    name:
      - git
      - git-lfs
    state: present

- name: Create group "{{ gitea_group_name }}"
  ansible.builtin.group:
    name: "{{ gitea_group_name }}"
    gid: "{{ gitea_group_id }}"
    system: true
    state: present

- name: Create user "{{ gitea_user_name }}"
  ansible.builtin.user:
    name: "{{ gitea_user_name }}"
    uid: "{{ gitea_user_id }}"
    group: "{{ gitea_group_name }}"
    system: true
    create_home: true
    home: /home/{{ gitea_user_name }}
    shell: /bin/bash
    state: present

- name: Create systemd service
  ansible.builtin.template:
    src: gitea.service.j2
    dest: /etc/systemd/system/gitea.service
    mode: "0644" # -rw-r--r--
  notify:
    - Restart systemd service

- name: Register version
  ansible.builtin.command: gitea --version
  register: gitea_version_cmd
  changed_when: false
  ignore_errors: true

- name: (Re)install
  when: gitea_version_cmd.rc != 0 or gitea_version not in gitea_version_cmd.stdout
  block:
    - name: Create temporary download file
      ansible.builtin.tempfile:
        suffix: "{{ gitea_download_filename }}"
        state: file
      register: gitea_download_file
    - name: Download "{{ gitea_download_filename }}"
      ansible.builtin.get_url:
        url: https://dl.gitea.com/gitea/{{ gitea_version }}/{{ gitea_download_filename }}
        checksum: "{{ gitea_download_checksum }}"
        dest: "{{ gitea_download_file.path }}"
        mode: "0700" # -rwx------
    - name: Stop systemd service
      ansible.builtin.systemd_service:
        name: gitea
        state: stopped
    - name: Install version "{{ gitea_version }}"
      ansible.builtin.copy:
        src: "{{ gitea_download_file.path }}"
        remote_src: true
        dest: /usr/local/bin/gitea
        mode: "0755" # -rwxr-xr-x
    - name: Delete temporary download file
      ansible.builtin.file:
        path: "{{ gitea_download_file.path }}"
        state: absent
    - name: Create required directories
      ansible.builtin.file:
        path: "{{ item }}"
        owner: "{{ gitea_user_name }}"
        group: "{{ gitea_group_name }}"
        mode: "0700" # rwx------
        state: directory
      loop:
        - /var/lib/gitea/custom
        - /var/lib/gitea/data
        - /var/lib/gitea/log

- name: Customize
  notify:
    - Restart systemd service
  block:
    - name: Create configuration directory
      ansible.builtin.file:
        path: /etc/gitea
        owner: root
        group: "{{ gitea_group_name }}"
        mode: "0750" # -rwxr-x---
        state: directory
    - name: Template app.ini
      ansible.builtin.template:
        src: app.ini.j2
        dest: /etc/gitea/app.ini
        owner: root
        group: "{{ gitea_group_name }}"
        mode: "0640" # -rw-r-----

- name: Enable and start systemd service
  ansible.builtin.systemd_service:
    name: gitea
    enabled: true
    state: started
